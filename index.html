<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Ternary Results Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #64748b;
      --line: #d8e0ea;
      --paper: #f7f8fa;
      --panel: #ffffff;
      --accent: #146c94;
      --accent-soft: #e6f4f8;
      --active: #f0aa3c;
      --shadow: 0 14px 36px rgba(31, 41, 55, 0.1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
    }

    .shell {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      padding: 22px 18px 24px;
    }

    .brand {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
      padding: 2px 4px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .nav-group { margin: 18px 0 22px; }

    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 4px 10px;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .count {
      display: inline-grid;
      min-width: 24px;
      height: 22px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0;
      background: #fff;
    }

    .nav-list, .nav-node, .nav-children { display: grid; gap: 8px; }

    .nav-children {
      margin-left: 16px;
      padding-left: 12px;
      border-left: 2px solid #e3e9f0;
    }

    .nav-button {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      cursor: pointer;
      padding: 11px 12px;
      text-align: left;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .nav-button.compact { min-height: 48px; padding: 9px 11px; }

    .nav-button:hover {
      transform: translateY(-1px);
      border-color: #99c7d9;
      box-shadow: 0 8px 22px rgba(20, 108, 148, 0.12);
    }

    .nav-button[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .nav-name {
      display: block;
      overflow-wrap: anywhere;
      font-size: 14px;
      font-weight: 760;
      line-height: 1.25;
    }

    .nav-meta {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .viewer { min-width: 0; padding: 24px; }

    .viewer-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    .title-block { min-width: 0; }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .viewer h2 {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #475569;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .result-stack, .material-section, .result-card { display: grid; gap: 18px; }
    .material-section { gap: 12px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 0;
      color: #334155;
      font-size: 15px;
      font-weight: 850;
      letter-spacing: 0;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .result-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #1f2937;
      font-size: 14px;
      font-weight: 820;
    }

    .result-title span:first-child { overflow-wrap: anywhere; }

    .kind-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      white-space: nowrap;
    }

    .result-body {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) 300px;
      gap: 12px;
      align-items: stretch;
    }

    .frame-wrap, .thumb-rail {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .frame-wrap { min-width: 0; min-height: 560px; }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 560px;
      border: 0;
      background: #fff;
    }

    .thumb-rail {
      display: grid;
      grid-template-rows: repeat(var(--thumb-count), minmax(0, 1fr));
      min-height: 560px;
    }

    .thumb {
      position: relative;
      display: grid;
      min-height: 108px;
      margin: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .thumb:last-child { border-bottom: 0; }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 10px;
    }

    .num {
      position: absolute;
      top: 8px;
      left: 8px;
      display: grid;
      width: 26px;
      height: 26px;
      place-items: center;
      border-radius: 999px;
      background: var(--active);
      color: #1f2933;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 6px 18px rgba(240, 170, 60, 0.28);
    }

    @media (max-width: 1180px) {
      .shell { grid-template-columns: 290px minmax(0, 1fr); }
      .result-body { grid-template-columns: 1fr; }
      .thumb-rail {
        grid-template-columns: repeat(var(--thumb-count), minmax(160px, 1fr));
        grid-template-rows: 1fr;
        min-height: 190px;
        overflow-x: auto;
      }
      .thumb { min-height: 190px; border-right: 1px solid var(--line); border-bottom: 0; }
      .thumb:last-child { border-right: 0; }
    }

    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        max-height: 48vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .viewer { padding: 18px; }
      .viewer-header { align-items: flex-start; flex-direction: column; }
      .summary { justify-content: flex-start; }
      .viewer h2 { font-size: 24px; }
      .frame-wrap, iframe { min-height: 500px; }
    }
  </style>
</head>

    function flattenEntries(items) {
      return items.flatMap((item) => [item, ...flattenEntries(item.children || [])]);
    }

    const entries = flattenEntries(navSections.flatMap((section) => section.entries));
    const nav = document.querySelector("#datasetNav");
    const viewGroup = document.querySelector("#viewGroup");
    const viewTitle = document.querySelector("#viewTitle");
    const viewCount = document.querySelector("#viewCount");
    const resultStack = document.querySelector("#resultStack");
    const buttons = new Map();

    function escapeText(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function renderNavEntry(entry, level = 0) {
      const node = document.createElement("div");
      node.className = "nav-node";

      const button = document.createElement("button");
      button.className = `nav-button${level > 0 ? " compact" : ""}`;
      button.type = "button";
      button.setAttribute("aria-selected", "false");
      button.innerHTML = `
        <span class="nav-name">${escapeText(entry.label)}</span>
        <span class="nav-meta">${escapeText(entry.meta)}</span>
      `;
      button.addEventListener("click", () => selectEntry(entry.key));
      buttons.set(entry.key, button);
      node.append(button);

      if (entry.children && entry.children.length) {
        const children = document.createElement("div");
        children.className = "nav-children";
        entry.children.forEach((child) => children.append(renderNavEntry(child, level + 1)));
        node.append(children);
      }

      return node;
    }

    function renderNav() {
      navSections.forEach((section) => {
        const groupEl = document.createElement("section");
        groupEl.className = "nav-group";

        const title = document.createElement("h2");
        title.className = "nav-group-title";
        title.innerHTML = `<span>${escapeText(section.label)}</span><span class="count">${section.entries.length}</span>`;

        const list = document.createElement("div");
        list.className = "nav-list";
        section.entries.forEach((entry) => list.append(renderNavEntry(entry)));

        groupEl.append(title, list);
        nav.append(groupEl);
      });
    }

    function renderResultCard(dataset) {
      const article = document.createElement("article");
      article.className = "result-card";
      article.innerHTML = `
        <div class="result-title">
          <span>${escapeText(dataset.name)}</span>
          <span class="kind-label">${escapeText(dataset.kind)}</span>
        </div>
        <div class="result-body">
          <div class="frame-wrap">
            <iframe src="${dataset.html}" title="${escapeText(dataset.name)} 3D ternary result"></iframe>
          </div>
          <aside class="thumb-rail" style="--thumb-count: ${Math.max(dataset.pngs.length, 1)}" aria-label="${escapeText(dataset.name)} fixed PNG views">
            ${dataset.pngs.map((png) => `
              <figure class="thumb">
                <span class="num">${png.label}</span>
                <img src="${png.src}" alt="${escapeText(dataset.name)} fixed view ${png.label}">
              </figure>
            `).join("")}
          </aside>
        </div>
      `;
      return article;
    }

    function renderSection(section) {
      const wrapper = document.createElement("section");
      wrapper.className = "material-section";

      if (section.title) {
        const title = document.createElement("h3");
        title.className = "section-title";
        title.textContent = section.title;
        wrapper.append(title);
      }

      section.datasets.forEach((dataset) => wrapper.append(renderResultCard(dataset)));
      return wrapper;
    }

    function selectEntry(key) {
      const entry = entries.find((item) => item.key === key) || entries[0];
      const datasetTotal = entry.sections.reduce((total, section) => total + section.datasets.length, 0);

      buttons.forEach((button, buttonKey) => {
        button.setAttribute("aria-selected", String(buttonKey === entry.key));
      });

      viewGroup.textContent = entry.group;
      viewTitle.textContent = entry.title;
      viewCount.textContent = `${datasetTotal} dataset${datasetTotal === 1 ? "" : "s"}`;
      resultStack.replaceChildren(...entry.sections.map(renderSection));
    }

    renderNav();
    selectEntry(entries[0].key);
  </script>
